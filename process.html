<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max it - Application Submitted</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --orange: #FF7900; --dark: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .icon { font-size: 60px; color: #22c55e; margin-bottom: 20px; }
        h2 { margin-bottom: 15px; }
        p { color: #64748b; margin-bottom: 30px; line-height: 1.6; }
        .btn { background: var(--orange); color: white; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 800; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
        <h2>Application Submitted</h2>
        <p>Your loan application has been received. Please proceed to log in to your Max It account to track your status.</p>
        <a href="login.html" class="btn">Go to Login Now</a>
    </div>
    <script>
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
    </script>
</body>
</html>
